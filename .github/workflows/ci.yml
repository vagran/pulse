name: CI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/vagran/pulse-build:latest

    env:
      DEBUGINFOD_URLS: https://debuginfod.archlinux.org

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure (cc/c++)
        run: cmake -S test -B build -G Ninja

      - name: Build (cc/c++)
        run: cmake --build build

      - &run-ut
        name: Run unit tests
        run: valgrind --leak-check=full build/pulse_test
